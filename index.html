<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领队对接工作流程</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6f8;color:#333;line-height:1.6}
.header{background:linear-gradient(135deg,#1A3C6E,#2B5F9E);color:#fff;padding:20px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px}
.header .sub{font-size:12px;opacity:.8;margin-top:2px}
.badge{display:inline-block;background:rgba(255,255,255,.2);border-radius:10px;padding:2px 10px;font-size:11px;margin-top:6px}
.pbar-out{max-width:500px;margin:10px auto 0;background:rgba(255,255,255,.2);border-radius:8px;height:6px;overflow:hidden}
.pbar-in{background:#E8833A;height:100%;border-radius:8px;transition:width .3s;width:0}
.pbar-txt{text-align:center;font-size:11px;margin-top:2px;opacity:.9}
.container{max-width:600px;margin:0 auto;padding:16px 12px 80px}
.share-bar{display:flex;gap:8px;margin-bottom:16px}
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
.btn-share{background:#E8833A;color:#fff;flex:1}
.btn-reset{background:#fff;border:1px solid #ddd;color:#666}
.step{background:#fff;border-radius:10px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #ddd}
.step.done{border-left-color:#27AE60;opacity:.85}
.step.active{border-left-color:#E8833A}
.step-hdr{padding:14px 16px;display:flex;align-items:center;cursor:pointer;gap:10px}
.step-num{font-size:11px;font-weight:700;color:#fff;background:#ccc;border-radius:4px;padding:2px 8px;white-space:nowrap}
.step.done .step-num{background:#27AE60}
.step.active .step-num{background:#E8833A}
.step-ttl{font-size:14px;font-weight:700;flex:1}
.step-arr{font-size:12px;color:#999;transition:transform .2s}
.step-arr.open{transform:rotate(90deg)}
.step-body{display:none;padding:0 16px 14px}
.step-body.show{display:block}
.step-body h4{font-size:12px;color:#1A3C6E;margin:10px 0 6px}
.chk{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid #f0f0f0}
.chk:last-child{border:none}
.cbox{width:18px;height:18px;border:2px solid #ccc;border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.cbox.on{background:#27AE60;border-color:#27AE60;color:#fff}
.tip{background:#FFF8E1;border-left:3px solid #E8833A;border-radius:6px;padding:8px 12px;margin-top:10px;font-size:12px;color:#8B6914;white-space:pre-wrap}
.tip b{color:#C77800}
.done-btn{margin-top:10px;width:100%;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:600;cursor:pointer}
.done-btn.do{background:#27AE60;color:#fff}
.done-btn.undo{background:#f0f0f0;color:#666}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.leader-bar{max-width:600px;margin:0 auto;padding:10px 12px 0;display:flex;gap:6px;align-items:center}
.leader-bar select{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit}
.leader-bar button{padding:8px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:none;font-weight:600}
.leader-bar .add{background:#fff;border:1px dashed #E8833A;color:#E8833A}
.leader-bar .del{background:#fff;border:1px solid #ddd;color:#999}
.dialog{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center}
.dialog.show{display:flex}
.dialog-card{background:#fff;border-radius:12px;padding:20px;width:85%;max-width:340px}
.dialog-card h3{font-size:16px;margin-bottom:10px}
.dialog-card input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;font-family:inherit}
.dialog-card .btns{display:flex;gap:8px;justify-content:flex-end}
.dialog-card .btns button{padding:6px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.dialog-card .cancel{background:#eee}
.dialog-card .ok{background:#E8833A;color:#fff;font-weight:600}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <h1>📋 领队对接工作流程</h1>
  <div class="sub">新东方文旅 · 标准化操作指引</div>
  <div class="badge" id="ver">v3.0</div>
  <div class="pbar-out"><div class="pbar-in" id="pbar"></div></div>
  <div class="pbar-txt" id="ptxt">0 / 8</div>
</div>

<div class="leader-bar">
  <select id="lsel" onchange="lsw(this.value)"></select>
  <button class="add" onclick="dlg()">＋ 新增</button>
  <button class="del" onclick="ldel()">🗑</button>
</div>

<div class="dialog" id="dlg">
  <div class="dialog-card">
    <h3>新增领队</h3>
    <input id="lname" placeholder="领队姓名">
    <div class="btns">
      <button class="cancel" onclick="dlgc()">取消</button>
      <button class="ok" onclick="ladd()">确认</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="flow"></div>
</div>

<script>
var FLOW=[
{id:1,t:"小程序注册与权限开通",d:"完成注册测试、上传无犯罪证明、开通权限",
 c:["指导领队进入微信小程序【新东方文旅领队】","上传无犯罪记录证明","提交账号注册","确认后台统一开通权限","完成在线测试"],
 tip:""},
{id:2,t:"企业微信核对",d:"确认企微已开通且正常使用",
 c:["确认领队是否已开通企业微信账号","确认企业微信可以正常登录、收发消息","如未开通或异常，联系远辉老师处理"],
 tip:""},
{id:3,t:"PPT准备与头像替换",d:"按模板替换企微头像，准备开营自我介绍PPT",
 c:['将PPT模板发送给领队 — <a href="leader-avatar-template.pptx" download style="color:#1A3C6E;font-weight:bold;">📥 头像模板</a> ｜ <a href="leader-intro-template.pptx" download style="color:#1A3C6E;font-weight:bold;">📥 自我介绍模板</a>','确认领队PPT内容无误'],
 tip:""},
{id:4,t:"入群与群管理",d:"邀请进入各群组，修改备注，保持静默",
 c:["将领队邀请进入「五大名校总群」，群内进行欢迎仪式","将领队邀请进入「港深领队总群」","将领队邀请进入「0623」「0627」家长群"],
 tip:"稍后我会邀请您进入【5大名校工作总群、领队总群】以及【港深较早团期的家长群】，后者是我们所有的领队老师都会先进群熟悉运营是怎么做的，带团的流程是什么样的。您进群以后，修改备注为新东方领队xx潜水即可。",
 tl:"话术"},
{id:5,t:"发送资料包",d:"发送手册、培训PPT、视频相册、出团通知书等全部资料",
 c:["发送《领队宝典手册》","发送《领队培训PPT》","发送「5大名校视频合集」和「喔图相册」","发送《出团通知书》模板（以0705为例）","发送《签注查询办理》指导文件","发送《漫游开通指导》文件","发送远辉老师港深培训链接和PPT","提醒领队认真阅读领队宝典和培训PPT，消化所有内容"],
 tip:"因为港澳线涉及港澳通行证和签注的检查，所以我们整体开始准备的时间会比较早，上述的资料和准备动作辛苦您最近可以先熟悉着。资料信息都比较多一点，辛苦您慢慢梳理，有任何问题我们随时沟通哦～",
 tl:"话术"},
{id:6,t:"约1v1线上沟通",d:"预约40分钟线上沟通，确认所有事项无遗漏",
 c:["确认沟通时间","发送会议链接给领队","发送会议链接给团操老师"],
 tip:"另外关于5大港澳微留学这个产品的熟悉，我们团操安迪老师想跟您约一个1v1的沟通，40分钟左右线上就可以，您看明后两天有没有方便的时间呀",
 tl:"话术"},
{id:7,t:"同步团操老师制作领队证书",d:"同步团操老师，安排制作并发送领队证书",
 c:["同步团操老师","给领队发送证书"],
 tip:"XX老师，这个是我们5大港澳微留学的领队证书，请您查收哦~这个证书也是我们5大今年特意给领队老师首创新增的，后续的话还有领队老师的邮件确认，预计是在月底发送，到时候您留意查收确认就好哈",
 tl:"话术"},
{id:8,t:"收集个人信息",d:"收集领队必要个人信息用于备案和证书制作",
 c:["发送信息收集模版","同步执行总表"],
 tip:"姓名：\n性别：\n电话：\n邮箱：\n身份证号：\n港澳通行证号码：\n银行卡号：\n开户行【全称含具体支行】：\n日常穿的衣服尺码【例如SMXL等】：\n\n还有就是辛苦您提供一下这些信息给我哦，港澳通行证和签注办理好之后也辛苦把正反面的照片拍我一下哈",
 tl:"话术"}
];

// === Data storage in URL hash ===
function enc(d){return encodeURIComponent(JSON.stringify(d))}
function dec(s){try{return JSON.parse(decodeURIComponent(s))}catch(e){return null}}

function save(){
  var h='#'+enc(DB);
  if(history.replaceState)history.replaceState({},'',h);
}

function load(){
  var h=location.hash;
  if(h&&h.length>1){
    var d=dec(h.substring(1));
    if(d&&d.leaders)return d;
  }
  return {cur:"默认领队",leaders:{"默认领队":{done:[],sub:{},exp:null}}};
}

var DB=load();
var cur=DB.cur;
var expanded=null;

function S(){return DB.leaders[cur]||{done:[],sub:{},exp:null}}

function render(){
  var s=S();
  expanded=s.exp;
  var html='';
  for(var i=0;i<FLOW.length;i++){
    var f=FLOW[i];
    var dn=s.done.indexOf(f.id)>=0;
    var act=!dn&&(i==0||s.done.indexOf(FLOW[i-1].id)>=0);
    var ex=expanded==f.id;
    html+='<div class="step'+(dn?' done':'')+(act&&!dn?' active':'')+'">';
    html+='<div class="step-hdr" onclick="tog('+f.id+')">';
    html+='<span class="step-num">步骤'+f.id+'</span>';
    html+='<span class="step-ttl">'+f.t+'</span>';
    html+='<span class="step-arr'+(ex?' open':'')+'">▶</span>';
    html+='</div>';
    if(ex){
      html+='<div class="step-body show">';
      html+='<h4>📝 操作清单</h4>';
      for(var j=0;j<f.c.length;j++){
        var k=f.id+'_'+j;
        var on=s.sub[k];
        html+='<div class="chk">';
        html+='<span class="cbox'+(on?' on':'')+'" onclick="ck('+f.id+','+j+',event)">'+(on?'✓':'')+'</span>';
        html+='<span>'+f.c[j]+'</span>';
        html+='</div>';
      }
      if(f.tip){
        html+='<div class="tip"><b>💡 '+(f.tl||'提示')+'：</b>'+f.tip+'</div>';
      }
      if(!dn){
        html+='<button class="done-btn do" onclick="mkdone('+f.id+',event)">✅ 标记完成</button>';
      }else{
        html+='<button class="done-btn undo" onclick="mkundone('+f.id+',event)">↩ 撤销完成</button>';
      }
      html+='</div>';
    }
    html+='</div>';
  }
  document.getElementById('flow').innerHTML=html;
  var pct=Math.round(s.done.length/FLOW.length*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('ptxt').textContent=s.done.length+' / '+FLOW.length+' · '+pct+'%';
  renderSel();
}

function renderSel(){
  var sel=document.getElementById('lsel');
  var names=Object.keys(DB.leaders);
  var h='';
  for(var i=0;i<names.length;i++){
    h+='<option value="'+names[i]+'"'+(names[i]==cur?' selected':'')+'>'+names[i]+'</option>';
  }
  sel.innerHTML=h;
}

function tog(id){
  var s=S();
  s.exp=(s.exp==id?null:id);
  save();
  render();
}

function ck(id,j,e){
  e.stopPropagation();
  var s=S();
  var k=id+'_'+j;
  if(s.sub[k])delete s.sub[k];else s.sub[k]=true;
  save();
  render();
}

function mkdone(id,e){
  e.stopPropagation();
  var s=S();
  if(s.done.indexOf(id)<0)s.done.push(id);
  s.exp=null;
  save();
  render();
  toast('✅ 步骤'+id+'已完成');
}

function mkundone(id,e){
  e.stopPropagation();
  var s=S();
  s.done=s.done.filter(function(x){return x!=id});
  save();
  render();
}

function lsw(name){
  DB.cur=name;
  cur=name;
  save();
  render();
}

function ladd(){
  var n=document.getElementById('lname').value.trim();
  if(!n){toast('请输入领队姓名');return}
  if(DB.leaders[n]){toast('该领队已存在');return}
  DB.leaders[n]={done:[],sub:{},exp:null};
  DB.cur=n;
  cur=n;
  save();
  dlgc();
  render();
  toast('已添加：'+n);
}

function ldel(){
  var names=Object.keys(DB.leaders);
  if(names.length<=1){toast('至少保留一位领队');return}
  if(!confirm('删除领队「'+cur+'」？'))return;
  delete DB.leaders[cur];
  cur=Object.keys(DB.leaders)[0];
  DB.cur=cur;
  save();
  render();
  toast('已删除');
}

function dlg(){
  document.getElementById('dlg').classList.add('show');
  document.getElementById('lname').value='';
}
function dlgc(){document.getElementById('dlg').classList.remove('show')}

function copyLink(){
  var url=location.href.split('#')[0]+'#'+enc(DB);
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast('✅ 链接已复制！发到手机即可同步')});
  }else{
    var ta=document.createElement('textarea');
    ta.value=url;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('✅ 链接已复制！发到手机即可同步');
  }
}

function reset(){
  if(confirm('重置「'+cur+'」的进度？')){
    DB.leaders[cur]={done:[],sub:{},exp:null};
    save();
    render();
    toast('已重置');
  }
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

// Init
render();
</script>
</body>
</html>
